services:
    openwebui:
      image: ghcr.io/open-webui/open-webui:main
      pull_policy: ${pull_policy:-missing}
      restart: ${restart:-always}

      depends_on:
        redis:
          condition: service_healthy
          restart: true

      environment:
        - ENV=prod
        - CUSTOM_NAME=${CUSTOM_NAME:-llm_lab}
        - WEBUI_NAME=${CUSTOM_NAME:-llm_lab}
        - ENABLE_SIGNUP=true
        - ENABLE_LOGIN_FORM=true
        - ENABLE_REALTIME_CHAT_SAVE=false
        - ENABLE_ADMIN_EXPORT=true
        - ENABLE_ADMIN_CHAT_ACCESS=true
        - ENABLE_CHANNELS=true
        - SHOW_ADMIN_DETAILS=true
        - DEFAULT_USER_ROLE=pending
        - DEFAULT_LOCALE=es
        - AIOHTTP_CLIENT_TIMEOUT=1000
        - ENABLE_OLLAMA_API=true
        - OLLAMA_BASE_URL=${UOLLAMA:-http://ollama:11434}
        - ENABLE_OPENAI_API=${ENABLE_OPENAI_API:-false}
        - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
        - ENABLE_AUTOCOMPLETE_GENERATION=true
        - AUTOCOMPLETE_GENERATION_INPUT_MAX_LENGTH=-1
        - ENABLE_EVALUATION_ARENA_MODELS=false
        - ENABLE_MESSAGE_RATING=true
        - ENABLE_COMMUNITY_SHARING=false
        - ENABLE_TAGS_GENERATION=true
        - ENABLE_FORWARD_USER_INFO_HEADERS=false
        - WEBUI_SESSION_COOKIE_SAME_SITE=strict
        - WEBUI_SESSION_COOKIE_SECURE=true
        - WEBUI_AUTH_COOKIE_SAME_SITE=strict
        - WEBUI_AUTH_COOKIE_SECURE=true
        - WEBUI_AUTH=true
        - OFFLINE_MODE=false
        - RESET_CONFIG_ON_START=false
        - SAFE_MODE=false
        - CORS_ALLOW_ORIGIN=*
        - WHISPER_MODEL_AUTO_UPDATE=true
        - ENABLE_GOOGLE_DRIVE_INTEGRATION=false
        - GOOGLE_DRIVE_CLIENT_ID=
        - GOOGLE_DRIVE_API_KEY=
        - ENABLE_IMAGE_GENERATION=false
        - IMAGE_GENERATION_ENGINE=comfyui
        - IMAGE_GENERATION_MODEL=
        - IMAGE_SIZE=512x512
        - IMAGE_STEPS=50
        - ENABLE_WEBSOCKET_SUPPORT=true
        - WEBSOCKET_MANAGER=redis
        - WEBSOCKET_REDIS_URL=${UREDIS:-redis://redis:6379/1}
        - REDIS_URL=${UREDIS:-redis://redis:6379/1}
        - ENABLE_SEARCH_QUERY_GENERATION=true

      ports:
        - ${PORT:-8383}:8080

      extra_hosts:
        - host.docker.internal:host-gateway

      volumes:
        - openwebui_data:/app/backend/data
        - /etc/timezone:/etc/timezone:ro
        - /etc/localtime:/etc/localtime:ro

      deploy:
        mode: global
        restart_policy:
          condition: on-failure
          delay: 5s
          max_attempts: 3
          window: 120s


volumes:
  openwebui_data:

